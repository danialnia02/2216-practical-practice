services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - appnet

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web-server
    ports:
      - "8000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - appnet

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - appnet


volumes:
  jenkins_home:

networks:
  appnet:
